    </div>

    <!-- ========== SECCIÓN DE CONTACTO ========== -->
    <section class="contacto">
        <div class="contacto-container">

            <!-- Foto destacada -->
            <div class="contacto-imagen">
                <img src="Assets/contacto-placeholder.jpg" alt="Contacta con SWY">
            </div>

            <!-- Formulario -->
            <div class="contacto-formulario">
                <h1 class="formulario-titulo">CONTÁCTANOS</h1>
                <p class="formulario-subtitulo">Déjanos un mensaje y te responderemos lo antes posible</p>

                <form action="#" method="POST" id="formContacto">
                    <!-- Nombre completo -->
                    <div class="campo-grupo">
                        <label for="nombre">Nombre completo *</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Ej: Ana García">
                    </div>

                    <!-- Correo electrónico -->
                    <div class="campo-grupo">
                        <label for="email">Correo electrónico *</label>
                        <input type="email" id="email" name="email" required placeholder="Ej: ana@correo.com">
                    </div>

                    <!-- Asunto -->
                    <div class="campo-grupo">
                        <label for="asunto">Asunto *</label>
                        <input type="text" id="asunto" name="asunto" required
                            placeholder="Ej: Consulta sobre productos">
                    </div>

                    <!-- Mensaje / Descripción -->
                    <div class="campo-grupo">
                        <label for="mensaje">Mensaje *</label>
                        <textarea id="mensaje" name="mensaje" rows="5" required
                            placeholder="Cuéntanos qué necesitas..."></textarea>
                    </div>

                    <!-- Botón de envío -->
                    <button type="submit" class="btn-enviar">ENVIAR MENSAJE</button>

                    <p class="form-nota">* Campos obligatorios</p>
                </form>
            </div>
        </div>
    </section>
